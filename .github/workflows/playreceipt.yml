name: PlayReceipt
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  evidence-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: receipt
        uses: ./
        with:
          evidence: examples/repaired-evidence.json
      - run: echo "${{ steps.receipt.outputs.verdict }} / ${{ steps.receipt.outputs['receipt-id'] }}"
